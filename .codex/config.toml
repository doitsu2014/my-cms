# Project-scoped Codex configuration.
# The server is also available globally in the developer's Codex config, but
# keeping it here makes the agent team portable for trusted checkouts.

[mcp_servers.code-review-graph]
command = "uvx"
args = ["code-review-graph", "serve"]
type = "stdio"

[agents]
# Allow up to two subagent threads alongside the primary agent.
# Prefer parallel read-heavy analysis; serialize edits to shared artifacts.
max_concurrent_threads_per_session = 2
