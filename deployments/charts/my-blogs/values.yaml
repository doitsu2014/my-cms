# Default values for my-blogs
# React SPAs served by nginx with runtime configuration

nameOverride: ''
fullnameOverride: ''

# Shared image credentials for pulling images
imageCredentials:
  registry: hub.docker.com
  username: doitsu2014
  password: __
  email: no-reply@dtech.com

# =====================================================
# Admin Side Configuration
# =====================================================
adminSide:
  enabled: true
  replicaCount: 1

  image:
    repository: doitsu2014/my-blogs-admin-side
    pullPolicy: Always
    tag: latest

  # Runtime application configuration
  # This generates config.js mounted at /usr/share/nginx/html/config.js
  appConfig:
    keycloakUrl: "https://your-keycloak-url"
    keycloakRealm: "your-realm"
    keycloakClientId: "your-client-id"
    keycloakScope: "my-headless-cms-api-all email openid profile"
    graphqlApiUrl: "https://your-api/graphql"
    graphqlCacheApiUrl: ""
    restApiUrl: "https://your-api"
    mediaUploadApiUrl: ""

  podAnnotations: {}
  serviceAnnotations: {}

  podSecurityContext: {}
  securityContext: {}

  service:
    type: ClusterIP
    port: 80
    ports:
      - port: 80
        targetPort: http
        protocol: TCP
        name: http

  container_ports:
    - name: http
      containerPort: 80
      protocol: TCP

  # Health check for nginx
  container_readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

  container_livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20

  ingress:
    enabled: false
    className: ''
    annotations: {}
    hosts: []
    tls: []

  resources: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

# =====================================================
# Client Side Configuration (SSR with Node.js)
# =====================================================
clientSide:
  enabled: false
  replicaCount: 1

  image:
    repository: doitsu2014/my-blogs-client-side
    pullPolicy: Always
    tag: latest

  # Runtime application configuration (passed as environment variables)
  appConfig:
    # Server port
    port: "3001"
    # Site branding
    siteName: "Duc Tran's Blog"
    siteUrl: "https://my-blogs.ducth.dev"
    avatarUrl: "https://my-cms-api.ducth.dev/media/wwlkmlklf2-duc-tran-png.png"
    # SEO defaults
    defaultTitle: "Duc Tran's Blog - Web Development & Technology"
    defaultDescription: "Hi! I'm Duc Tran, a passionate developer sharing insights about web development, technology, and software engineering."
    # Social links (for future use)
    socialGithub: "https://github.com"
    socialTwitter: "https://twitter.com"
    socialLinkedin: "https://linkedin.com"

  podAnnotations: {}
  serviceAnnotations: {}

  podSecurityContext: {}
  securityContext: {}

  service:
    type: ClusterIP
    port: 3001
    ports:
      - port: 3001
        targetPort: http
        protocol: TCP
        name: http

  container_ports:
    - name: http
      containerPort: 3001
      protocol: TCP

  # Health check for Node.js SSR server
  container_readinessProbe:
    httpGet:
      path: /en
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

  container_livenessProbe:
    httpGet:
      path: /en
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20

  ingress:
    enabled: false
    className: ''
    annotations: {}
    hosts: []
    tls: []

  resources: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}
