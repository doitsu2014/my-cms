{{- if .Values.clientSide.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "my-blogs.clientSide.fullname" . }}-config
  labels:
    {{- include "my-blogs.clientSide.labels" . | nindent 4 }}
data:
  # Node.js environment
  NODE_ENV: "production"
  PORT: {{ .Values.clientSide.appConfig.port | quote }}
  # Site branding
  SITE_NAME: {{ .Values.clientSide.appConfig.siteName | quote }}
  SITE_URL: {{ .Values.clientSide.appConfig.siteUrl | quote }}
  AVATAR_URL: {{ .Values.clientSide.appConfig.avatarUrl | quote }}
  # SEO defaults
  DEFAULT_TITLE: {{ .Values.clientSide.appConfig.defaultTitle | quote }}
  DEFAULT_DESCRIPTION: {{ .Values.clientSide.appConfig.defaultDescription | quote }}
  # Social links
  SOCIAL_GITHUB: {{ .Values.clientSide.appConfig.socialGithub | quote }}
  SOCIAL_TWITTER: {{ .Values.clientSide.appConfig.socialTwitter | quote }}
  SOCIAL_LINKEDIN: {{ .Values.clientSide.appConfig.socialLinkedin | quote }}
{{- end }}
