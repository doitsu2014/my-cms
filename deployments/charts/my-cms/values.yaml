# Default values for my-cms umbrella chart
# This chart deploys both my-cms-api and my-cms-admin as sub-charts

# Global values shared across all sub-charts
global:
  # Shared image pull secrets name (if using the same registry)
  imagePullSecrets: []

# =====================================================
# my-cms-api Configuration
# Backend Rust API server
# =====================================================
my-cms-api:
  enabled: true
  replicaCount: 1

  image:
    repository: registry.hub.docker.com/doitsu2014/my-cms
    pullPolicy: Always
    tag: latest

  imageCredentials:
    registry: hub.docker.com
    username: doitsu2014
    password: __
    email: no-reply@dtech.com

  nameOverride: ""
  fullnameOverride: ""
  env: []
  podAnnotations: {}
  serviceAnnotations: {}

  podSecurityContext: {}
  securityContext: {}

  service:
    type: ClusterIP
    port: 5000
    ports:
      - port: 5000
        targetPort: http
        protocol: TCP
        name: http

  container_ports:
    - name: http
      containerPort: 5000
      protocol: TCP

  container_readinessProbe: {}
  container_livenessProbe: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  secretData: {}

  resources: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

# =====================================================
# my-cms-admin Configuration
# Admin UI React SPA served by nginx
# =====================================================
my-cms-admin:
  enabled: true

  nameOverride: ""
  fullnameOverride: ""

  imageCredentials:
    registry: hub.docker.com
    username: doitsu2014
    password: __
    email: no-reply@dtech.com

  adminSide:
    enabled: true
    replicaCount: 1

    image:
      repository: doitsu2014/my-cms-admin
      pullPolicy: Always
      tag: latest

    # Runtime application configuration
    # This generates config.js mounted at /usr/share/nginx/html/config.js
    appConfig:
      keycloakUrl: "https://your-keycloak-url"
      keycloakRealm: "your-realm"
      keycloakClientId: "your-client-id"
      keycloakScope: "my-headless-cms-api-all email openid profile"
      graphqlApiUrl: "https://your-api/graphql"
      graphqlCacheApiUrl: ""
      restApiUrl: "https://your-api"
      mediaUploadApiUrl: ""

    podAnnotations: {}
    serviceAnnotations: {}

    podSecurityContext: {}
    securityContext: {}

    service:
      type: ClusterIP
      port: 80
      ports:
        - port: 80
          targetPort: http
          protocol: TCP
          name: http

    container_ports:
      - name: http
        containerPort: 80
        protocol: TCP

    container_readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10

    container_livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 20

    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
      tls: []

    resources: {}

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      targetCPUUtilizationPercentage: 80

    nodeSelector: {}
    tolerations: []
    affinity: {}

  # Client Side is disabled by default (not used in current setup)
  clientSide:
    enabled: false
