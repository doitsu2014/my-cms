# Traefik dynamic config — routes for my-cms + supabase
# File provider, no Docker socket needed
#
# Consumes env vars (loaded from ../.env via docker-compose.yaml):
#   CMS_ADMIN_HOST     — Host() rule for the admin frontend router
#   CMS_API_HOST       — Host() rule for the my-cms API router
#   CMS_STUDIO_HOST    — Host() rule for the Supabase Studio router (Basic Auth protected)
#   CMS_SUPABASE_HOST  — Host() rule for the Kong / Supabase API router
#   CMS_ADMIN_ORIGIN   — CORS origin allowed for the admin frontend
#   CMS_SUPABASE_ORIGIN— CORS origin allowed for supabase-api / Kong
#   STUDIO_BASIC_AUTH_USERS — bcrypt user:hash entries for the Studio basic-auth middleware

http:
  routers:
    # --- cms-admin (frontend) → http://${CMS_ADMIN_HOST} → my-cms-frontend:80 ---
    admin:
      rule: "Host(`{{ env "CMS_ADMIN_HOST" | default "cms-admin.ducth.dev" }}`)"
      entryPoints:
        - web
      service: admin-service
      middlewares:
        - admin-compress
        - security-headers

    # --- cms-api (API) → http://${CMS_API_HOST} → my-cms-api:8989 ---
    api:
      rule: "Host(`{{ env "CMS_API_HOST" | default "cms-api.ducth.dev" }}`)"
      entryPoints:
        - web
      service: api-service
      middlewares:
        - api-cors
        - api-buff
        - security-headers

    # --- supabase Studio → http://${CMS_STUDIO_HOST} → supabase-studio:3000 ---
    # NOTE: Kong (`8000`) and Studio (`3000`) are distinct services with
    # distinct Host rules; this router is the Studio, the next one is Kong.
    studio:
      rule: "Host(`{{ env "CMS_STUDIO_HOST" | default "supabase.ducth.dev" }}`)"
      entryPoints:
        - web
      service: studio-service
      middlewares:
        - studio-basic-auth
        - studio-headers

    # --- supabase-api (Kong / Supabase API) → http://${CMS_SUPABASE_HOST} → supabase-kong:8000 ---
    supabase-api:
      rule: "Host(`{{ env "CMS_SUPABASE_HOST" | default "supabase-api.ducth.dev" }}`)"
      entryPoints:
        - web
      service: kong-service
      middlewares:
        - cors-everything

  services:
    admin-service:
      loadBalancer:
        servers:
          - url: "http://my-cms-frontend:80"

    api-service:
      loadBalancer:
        servers:
          - url: "http://my-cms-api:8989"

    studio-service:
      loadBalancer:
        servers:
          - url: "http://supabase-studio:3000"

    kong-service:
      loadBalancer:
        servers:
          - url: "http://supabase-kong:8000"

  middlewares:
    admin-compress:
      compress: {}

    security-headers:
      headers:
        customFrameOptionsValue: "SAMEORIGIN"
        contentTypeNosniff: true
        browserXssFilter: true

    api-cors:
      headers:
        accessControlAllowOriginList:
          - "{{ env "CMS_ADMIN_ORIGIN" | default "https://cms-admin.ducth.dev" }}"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - apikey
          - x-supabase-api-version
          - x-client-info
        accessControlAllowCredentials: true

    api-buff:
      buffering:
        maxRequestBodyBytes: 52428800  # 50MB for media uploads

    studio-basic-auth:
      basicAuth:
        users:
          - '{{ env "STUDIO_BASIC_AUTH_USERS" }}'

    studio-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"

    cors-everything:
      headers:
        accessControlAllowOriginList:
          - "{{ env "CMS_ADMIN_ORIGIN" | default "https://cms-admin.ducth.dev" }}"
          - "{{ env "CMS_SUPABASE_ORIGIN" | default "https://supabase-api.ducth.dev" }}"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - apikey
          - x-supabase-api-version
          - x-client-info
          - range
          - x-range
        accessControlAllowCredentials: true