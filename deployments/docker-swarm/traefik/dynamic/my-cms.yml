# Traefik dynamic config — routes for my-cms + supabase
# File provider, no Docker socket needed
#
# Consumes env vars (loaded from .env.my-cms via docker-compose.traefik.yaml):
#   CMS_HOST            — Host() rule for all four routers (default: localhost)
#   CMS_ADMIN_ORIGIN    — CORS origin for admin frontend (default: http://localhost:3002)
#   CMS_SUPABASE_ORIGIN — CORS origin for supabase-api / Kong (default: http://localhost)

http:
  routers:
    # --- cms-admin (frontend) → http://${CMS_HOST}:3002 ---
    admin:
      rule: "Host(`{{ env "CMS_HOST" | default "localhost" }}`)"
      entryPoints:
        - web
      service: admin-service
      middlewares:
        - admin-compress
        - security-headers

    # --- cms-api (API) → http://${CMS_HOST}:8989 ---
    api:
      rule: "Host(`{{ env "CMS_HOST" | default "localhost" }}`)"
      entryPoints:
        - web
      service: api-service
      middlewares:
        - api-cors
        - api-buff
        - security-headers

    # --- supabase (Studio) → http://${CMS_HOST}:3000 (via Kong :8000) ---
    studio:
      rule: "Host(`{{ env "CMS_HOST" | default "localhost" }}`)"
      entryPoints:
        - web
      service: studio-service
      middlewares:
        - studio-basic-auth
        - studio-headers

    # --- supabase-api (Kong / Supabase API) → http://${CMS_HOST}:8000 ---
    supabase-api:
      rule: "Host(`{{ env "CMS_HOST" | default "localhost" }}`)"
      entryPoints:
        - web
      service: kong-service
      middlewares:
        - cors-everything

  services:
    admin-service:
      loadBalancer:
        servers:
          - url: "http://my-cms-frontend:80"

    api-service:
      loadBalancer:
        servers:
          - url: "http://my-cms-api:8989"

    studio-service:
      loadBalancer:
        servers:
          - url: "http://supabase-studio:3000"

    kong-service:
      loadBalancer:
        servers:
          - url: "http://supabase-kong:8000"

  middlewares:
    admin-compress:
      compress: {}

    security-headers:
      headers:
        customFrameOptionsValue: "SAMEORIGIN"
        contentTypeNosniff: true
        browserXssFilter: true

    api-cors:
      headers:
        accessControlAllowOriginList:
          - "{{ env "CMS_ADMIN_ORIGIN" | default "http://localhost:3002" }}"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - apikey
          - x-supabase-api-version
          - x-client-info
        accessControlAllowCredentials: true

    api-buff:
      buffering:
        maxRequestBodyBytes: 52428800  # 50MB for media uploads

    studio-basic-auth:
      basicAuth:
        users:
          - '{{ env "STUDIO_BASIC_AUTH_USERS" }}'

    studio-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"

    cors-everything:
      headers:
        accessControlAllowOriginList:
          - "{{ env "CMS_ADMIN_ORIGIN" | default "http://localhost:3002" }}"
          - "{{ env "CMS_SUPABASE_ORIGIN" | default "http://localhost" }}"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - apikey
          - x-supabase-api-version
          - x-client-info
          - range
          - x-range
        accessControlAllowCredentials: true
