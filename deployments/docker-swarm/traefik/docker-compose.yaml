# docker-compose.yaml (Traefik proxy stack)
# Traefik reverse proxy with file-based routing (no Docker socket needed).
# Cloudflare terminates SSL, so HTTP-only on port 80.
#
# Lives under deployments/docker-swarm/traefik/ so the proxy deployment
# surface stays isolated from the apps and Supabase stacks. Paths in this
# file are relative to its own directory.
#
# Usage (from this directory):
#   docker compose up -d
#   # or via the helper:
#   ./reset.sh

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    env_file: ./.env
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./dynamic:/etc/traefik/dynamic:ro
    networks:
      - supabase_network

networks:
  supabase_network:
    external: true
    name: supabase_network
